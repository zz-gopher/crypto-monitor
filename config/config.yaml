
app:
  # 轮询：每隔多久跑一轮“全量查询”（network × addresses × assets）
  poll_interval: 60s

  # 单次 RPC 请求的超时时间（不是整轮的超时）
  timeout: 8s

  # 并发：同时跑多少个请求任务（太大容易打爆 RPC / 太小速度慢）
  concurrency: 64

  # 限流：全局每秒最多发多少个 RPC（保护你的 RPC key 和节点）
  rate_limit:
    rps: 20      # 每秒请求数
    burst: 40    # 突发容量

  # Token 元数据自动发现后的本地缓存（symbol/name/decimals 等）
  metadata_cache:
    dir: "./data/cache" # 缓存目录
    ttl: 720h           # 过期时间：30天（720h）。过期才重新链上探测

# ====== 输出结构 ======
output:
  # ===== 测试阶段：只看控制台 =====
  console:
    enabled: true
    format: table         # table / json
    decimals: 6
    show_wei: false

  # ===== 落盘阶段：输出 CSV =====
  csv:
    enabled: false        # ✅ 测试时先关掉；上线/跑批时打开
    path: "./output/rich_wallet.csv"
    mode: append          # append(追加) / overwrite(覆盖)
    flush_every: 200      # 写入多少行后 flush 一次（防止缓冲丢数据）

    # CSV 列定义（你可以按这个顺序输出）
    columns:
      - timestamp
      - network
      - chain_id
      - wallet_address
      - wallet_label
      - asset_type
      - contract
      - symbol
      - decimals
      - balance_raw          # 原始 big.Int（Wei 或 token 最小单位）
      - balance_formatted    # 按 decimals 换算后的展示值

# ====== 网络（RPC 节点）======
networks:
  ethereum-mainnet:
    chain_id: 1
    rpc:
      - ${ETH_RPC_URL}
    native_symbol: ETH

  arbitrum-one:
    chain_id: 42161
    rpc:
      - ${ARB_RPC_URL}
    native_symbol: ETH

# ====== 监控任务（组合网络 + 地址源 + 资产）======
watchlists:
  - name: main-monitor
    networks: [ethereum-mainnet, arbitrum-one]  # 要跑哪些网络
    address_source: whales_csv                  # 用哪个地址来源

    assets:
      # 1) 原生资产（ETH）：走 eth_getBalance / BalanceAt
      - type: native

      # 2) ERC-20：只填合约地址
      # 程序会链上读取 decimals()/symbol()/name() 并缓存
      - type: erc20
        contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7"  # USDT 主网
        # 注意：同一 token 在不同链的合约地址不同
        networks: [ethereum-mainnet]  # 可选：限制只在指定网络查询

      - type: erc20
        contract: "0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9"  # USDT Arbitrum
        networks: [arbitrum-one]

      - type: erc20
        contract: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"  # WETH 主网
        networks: [ethereum-mainnet]