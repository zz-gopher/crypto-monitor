app:
  # 轮询：每隔多久跑一轮“全量查询”（network × addresses × assets）
  poll_interval: 60s

  # 单次 RPC 请求的超时时间（不是整轮的超时）
  timeout: 8s

  # 并发：同时跑多少个请求任务（太大容易打爆 RPC / 太小速度慢）
  concurrency: 64

  # 限流：全局每秒最多发多少个 RPC（保护你的 RPC key 和节点）
  rate_limit:
    rps: 20      # 每秒请求数
    burst: 40    # 突发容量

  # Token 元数据自动发现后的本地缓存（symbol/name/decimals 等）
  metadata_cache:
    dir: "./data/cache" # 缓存目录
    ttl: 720h           # 过期时间：30天（720h）。过期才重新链上探测

# ====== 输出结构 ======
output:
  # ===== 测试阶段：只看控制台 =====
  console:
    enabled: true
    format: table         # table / json
    decimals: 6
    show_wei: false

  # ===== 落盘阶段：输出 CSV =====
  csv:
    enabled: false        # ✅ 测试时先关掉；上线/跑批时打开
    path: "./output/rich_wallet.csv"
    mode: append          # append(追加) / overwrite(覆盖)
    flush_every: 200      # 写入多少行后 flush 一次（防止缓冲丢数据）

    # CSV 列定义（你可以按这个顺序输出）
    columns:
      - timestamp
      - network
      - chain_id
      - wallet_address
      - wallet_label
      - asset_type
      - contract
      - symbol
      - decimals
      - balance_raw          # 原始 big.Int（Wei 或 token 最小单位）
      - balance_formatted    # 按 decimals 换算后的展示值

# ====== 网络（RPC 节点）======
networks:
  ethereum-mainnet: { chain_id: 1, rpc: ["${ETH_RPC_URL}"], native_symbol: ETH }
  arbitrum-one:     { chain_id: 42161, rpc: ["${ARB_RPC_URL}"], native_symbol: ETH }

tokens:
  USDT:
    type: erc20
    per_network:
      ethereum-mainnet: { contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
      arbitrum-one:     { contract: "0xfd086bc7cd5c481dcc9c85ebe478a1c0b69fcbb9" }

  USDC:
    type: erc20
    per_network:
      ethereum-mainnet: { contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" }
      arbitrum-one:     { contract: "0xaf88d065e77c8cC2239327C5EDb3A432268e5831" }

# ====== 监控任务（组合网络 + 地址源 + 资产）======
watchlists:
  - name: main-monitor
    networks: [ethereum-mainnet, arbitrum-one]  # 要跑哪些网络
    address_glob: "./data/addresses/*.txt"                  # 用哪个地址来源 支持globe

    assets:
      - type: native
      - token: USDT
      - token: USDC